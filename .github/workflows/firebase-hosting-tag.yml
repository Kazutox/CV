# Deploy to Firebase Hosting on tag push
name: Deploy to Firebase Hosting on tag
'on':
  push:
    tags:
      - 'v*'
      - 'release-*'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: oven-sh/setup-bun@v2
      - run: bun install && bun run build-only
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JCLOETE_DEV }}'
          channelId: live
          projectId: jcloete-dev
          target: cv-jcloete-dev